<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <title>Forms</title>
  </head>
  <body>
    <!-- Netlify form detection (not shown to visitors) -->
    <form name="quote" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote" />
      <input name="bot-field" />
      <input name="name" />
      <input name="phone" />
      <input name="email" />
      <input name="job_commercial" />
      <input name="job_domestic" />
      <input name="job_not_sure" />
      <textarea name="message"></textarea>
      <input name="consent" />
    </form>
    <form name="maintenance-enquiry" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="maintenance-enquiry" />
      <input name="bot-field" />
      <input name="name" />
      <input name="company" />
      <input name="email" />
      <input name="phone" />
      <input name="property_type" />
      <input name="properties_count" />
      <input name="preferred_plan" />
      <textarea name="message"></textarea>
      <input name="consent" />
    </form>
    <form name="maintenance-quick" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="maintenance-quick" />
      <input name="bot-field" />
      <input name="name" />
      <input name="phone" />
      <input name="email" />
      <input name="property_type" />
      <input name="preferred_plan" />
      <input name="consent" />
    </form>
  </body>
</html>
