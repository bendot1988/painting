[build]
  command = "npm run build"
  publish = "dist"

# Redirect loops (ERR_TOO_MANY_REDIRECTS) usually come from:
# 1. Trailing-slash rules in public/_redirects (/work → /work/) — do not add them.
# 2. Netlify Domain settings fighting each other (www → apex AND apex → www).
#    Pick ONE primary host in Netlify → Domain management. This site uses as-painting.co.uk
#    (www redirects there once). Do not add opposing host redirects here.

[functions]
  directory = "netlify/functions"

# Quote form: browser POSTs to netlify/functions/submit-quote.mjs (Resend).
# submission-created.mjs is a backup if Netlify Forms detection is enabled.
# Set RESEND_API_KEY, RESEND_FROM, RESEND_TO (and optional RESEND_BCC) in Netlify UI.
